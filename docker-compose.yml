version: "3"
services:
  react:
    build:
      context: ./my-todo-app
      dockerfile: Dockerfile
    volumes:
      - ./my-todo-app:/app
      # ノードモジュールだけはコンテナ側で管理するための呪文（パフォーマンス向上）
      - /app/node_modules
    ports:
      - 3000:3000
    environment:
      - CHOKIDAR_USEPOLLING=true # WSL2でファイルの変更を検知しやすくする設定
  app:
    build:
      context: .
      dockerfile: ./php/Dockerfile
    user: "1000:1000"
    volumes: 
      - ./curriculum/laravel:/var/laravel-curriculum
  nginx:
    image: nginx:1.23
    ports:
      - 8080:80
    volumes:
      - ./nginx/config/default.conf:/etc/nginx/conf.d/default.conf
      - ./curriculum/laravel:/var/laravel-curriculum
    depends_on:
      - app
  mysql:
    image: mysql:8.0
    platform: linux/x86_64
    command: mysqld --character-set-server=utf8 --collation-server=utf8_unicode_ci
    volumes:
      - ./mysql:/var/lib/mysql
      - ./curriculum/sql:/var/sql-curriculum/
    environment:
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - 3306:80